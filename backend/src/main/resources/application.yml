server:
  port: 3000


spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${SYSTEM_EMAIL}
    password: ${SYSTEM_EMAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
        debug: false

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true